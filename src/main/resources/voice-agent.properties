# Voice Agent Configuration
# API keys can also be set via environment variables

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY}
llm.model=gpt-4o

# Deepgram STT Configuration  
deepgram.api.key=${DEEPGRAM_API_KEY}
stt.model=nova-2

# ElevenLabs TTS Configuration
elevenlabs.api.key=${ELEVENLABS_API_KEY}
tts.voice.id=21m00Tcm4TlvDq8ikWAM

# LiveKit RTC Configuration
livekit.api.key=${LIVEKIT_API_KEY}
livekit.api.secret=${LIVEKIT_API_SECRET}
livekit.server.url=wss://localhost:7880

# Agent Configuration
agent.name=VoiceAgent
default.room=voice-agent-room
enable.barge.in=true

# Logging (0=ERROR, 1=INFO, 2=DEBUG, 3=TRACE)
log.level=1
