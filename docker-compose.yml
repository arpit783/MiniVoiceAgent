version: '3.8'

services:
  voice-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-voice-agent
    ports:
      - "8765:8765"
      - "3000:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - TTS_VOICE_ID=${TTS_VOICE_ID:-21m00Tcm4TlvDq8ikWAM}
      - STT_MODEL=${STT_MODEL:-nova-2}
      - ENABLE_BARGE_IN=${ENABLE_BARGE_IN:-true}
      - AGENT_NAME=${AGENT_NAME:-VoiceAgent}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "java.*app.jar"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Run in demo mode
  voice-agent-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-voice-agent-demo
    command: ["--demo"]
    profiles:
      - demo
    ports:
      - "8766:8765"
    restart: "no"
